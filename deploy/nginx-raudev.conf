################################################################################
# nginx site config for raudev.com
#
# - Serves the static frontend from /var/www/portfolio/frontend
# - Reverse-proxies /api/ to the Node contact backend on 127.0.0.1:3001
#
# Install:
#   sudo cp deploy/nginx-raudev.conf /etc/nginx/sites-available/raudev.com
#   sudo ln -s /etc/nginx/sites-available/raudev.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (port 443 + HTTP->HTTPS redirect) is added automatically by certbot:
#   sudo certbot --nginx -d raudev.com -d www.raudev.com
################################################################################

# Drop all requests for unknown hostnames (e.g. foreign domains pointing to this IP)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name raudev.com www.raudev.com;

    root /var/www/portfolio/frontend;
    index index.html;

    # Sensible defaults
    client_max_body_size 1m;
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Cache static assets (fonts, css, js, images) for a year
    # Block hotlinking from external domains
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        valid_referers none blocked server_names raudev.com www.raudev.com;
        if ($invalid_referer) {
            return 403;
        }
    }

    # Static site (handles subdirs like /legal-notice/ too)
    location / {
        if ($http_referer ~* "arschgeficke\.de") {
            return 403;
        }
        try_files $uri $uri/ =404;
    }

    # Contact form backend -> Node/Express on port 3001
    # Block requests that don't originate from own domain
    location /api/ {
        valid_referers none blocked server_names raudev.com www.raudev.com;
        if ($invalid_referer) {
            return 403;
        }

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
